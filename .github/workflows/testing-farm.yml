---
name: Testing Farm Tests
run-name: Run pcs dev-tests in Testing Farm 🚀
on: [push]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  linters:
    runs-on: ubuntu-latest
    steps:
      - name: DEBUG
        run: pwd; ls -la
      - run: echo "Git pull ref ${{ github.event.pull_request.head.ref }}"
      - name: Run linters on Testing-Farm
        uses: sclorg/testing-farm-as-github-action@v4
        with:
          api_key: ${{ secrets.TESTING_FARM_API_TOKEN }}
          git_url: ${{ github.server_url }}/${{ github.repository }}
          git_ref: ${{ github.ref }}
          tmt_plan_regex: "/plans/linters"
          compose: "Fedora-43"
          tmt_context: distro=fedora-43
          variables: COMPOSE_NAME=FedoraCurrentRelease
          pull_request_status_name: "Testing Farm - linters"
          update_pull_request_status: true
          create_issue_comment: true
  tier0:
    runs-on: ubuntu-latest
    steps:
      - name: DEBUG
        run: |
          pwd
          ls -la
      - name: Run tier0 tests on Testing-Farm
        uses: sclorg/testing-farm-as-github-action@v4
        with:
          api_key: ${{ secrets.TESTING_FARM_API_TOKEN }}
          git_url: ${{ github.server_url }}/${{ github.repository }}
          git_ref: ${{ github.ref }}
          tmt_plan_regex: "tier0"
          compose: "CentOS-Stream-10"
          tmt_context: distro=rhel-10
          variables: COMPOSE_NAME=CentOSStreamCurrentRelease
          pull_request_status_name: "Testing Farm - tier0"
          update_pull_request_status: true
          create_issue_comment: true
