---
name: Testing Farm Tests
on:
  push:
  pull_request:
    types: [opened, synchronized, reopened]
  pull_request_target:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          USE_PCS_011=false

          case "${{ github.event_name }}" in
            push)
              REF="${{ github.ref }}"
              if [[ "$REF" == refs/heads/pcs-0.11_* ]]; then
                USE_PCS_011=true
              fi
              ;;
            pull_request|pull_request_target)
              BASE="${{ github.event.pull_request.base.ref }}"
              if [[ "$BASE" == "pcs-0.11" ]]; then
                USE_PCS_011=true
              fi
              ;;
            issue_comment)
              REPO="${{ github.repository }}"
              PR="${{ github.event.issue.number }}"
              BASE_REF=$(
                gh api \
                  "repos/${REPO}/pulls/${PR}" \
                  --jq '.base.ref' \
                  2>/dev/null || echo ""
              )
              if [[ "$BASE_REF" == "pcs-0.11" ]]; then
                USE_PCS_011=true
              fi
              ;;
          esac

          if [[ "$USE_PCS_011" == "true" ]]; then
            MATRIX=".github/matrices/tf-pcs-0.11.json"
          else
            MATRIX=".github/matrices/tf-main.json"
          fi

          echo "matrix=$(jq -c . "$MATRIX")" \
            >> "$GITHUB_OUTPUT"

  tf-tests:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    if: |
      github.repository == 'mirecheck/pcs' &&
      (github.event_name != 'issue_comment' ||
        (github.event.issue.pull_request &&
          contains(
            github.event.comment.body,
            '[tftests]'
          ) &&
          contains(
            fromJson('["OWNER", "MEMBER"]'),
            github.event.comment.author_association
          )))
    steps:
      - run: echo "Git pull ref ${{ github.event.pull_request.head.ref }}"
      - run: echo ${{ github.event.comment.author_association }}
      - name: Run tests on Testing-Farm
        uses: sclorg/testing-farm-as-github-action@v4
        with:
          api_key: ${{ secrets.TESTING_FARM_API_TOKEN }}
          git_url: ${{ github.server_url }}/${{ github.repository }}
          git_ref: ${{ github.ref }}
          tmt_plan_regex: ${{ matrix.tmt_plan_regex }}
          compose: ${{ matrix.compose }}
          tmt_context: ${{ matrix.tmt_context }}
          variables: ${{ matrix.variables }}
          pull_request_status_name: ${{ matrix.compose }}
          update_pull_request_status: true
          create_issue_comment: true
